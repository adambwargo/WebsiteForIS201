<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle — Adam Wargo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #121213; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    header { width: 100%; border-bottom: 1px solid #3a3a3c; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; max-width: 500px; margin: 0 auto; }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
    header a { color: #818384; text-decoration: none; font-size: 0.8rem; }
    header a:hover { color: #c9a84c; }
    #msg { font-size: 14px; font-weight: 500; color: #818384; height: 24px; text-align: center; margin: 12px 0; }
    #board { display: grid; grid-template-rows: repeat(6,1fr); gap: 6px; margin-bottom: 16px; }
    .row { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; }
    .tile { width: 60px; height: 60px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 700; text-transform: uppercase; transition: background 0.3s, border-color 0.3s; border-radius: 2px; }
    .tile.filled { border-color: #818384; }
    .tile.correct { background: #538d4e; border-color: #538d4e; }
    .tile.present { background: #b59f3b; border-color: #b59f3b; }
    .tile.absent  { background: #3a3a3c; border-color: #3a3a3c; }
    .tile.shake { animation: shake 0.4s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
    .tile.pop { animation: pop 0.1s; }
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
    #keyboard { display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .kb-row { display: flex; gap: 5px; }
    .key { height: 58px; min-width: 43px; padding: 0 6px; border-radius: 4px; border: none; background: #818384; color: white; font-size: 0.85rem; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: background 0.3s; }
    .key.wide { min-width: 66px; font-size: 0.75rem; }
    .key.correct { background: #538d4e; }
    .key.present { background: #b59f3b; }
    .key.absent  { background: #3a3a3c; }
    #play-again { display: none; margin: 16px auto; padding: 12px 32px; border-radius: 4px; border: none; background: #538d4e; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
    #play-again:hover { background: #6aaf60; }
  </style>
</head>
<body>
  <header>
    <a href="scratch.html">← Back</a>
    <h1>Wordle</h1>
    <a href="index.html">Home</a>
  </header>

  <div id="msg">Guess the word!</div>
  <div id="board"></div>
  <div id="keyboard"></div>
  <button id="play-again" onclick="initGame()">Play Again</button>

  <script>
    const WORDS=["CRANE","SLATE","TRACE","AUDIO","PLANT","STORM","BLAZE","CRISP","DWARF","EMBER","FLINT","GROVE","HASTE","INGOT","JOUST","KNAVE","LURCH","MIRTH","NOVEL","OZONE","PRISM","QUEST","RAVEN","SWAMP","THYME","ULTRA","VAPOR","WITCH","XENON","YACHT","ZONAL","BREAD","CLOUD","DANCE","EAGLE","FLAME","GHOST","HOUND","IVORY","JEWEL","KNEEL","LEMON","MARSH","NYMPH","ORBIT","PLUME","QUILT","REBEL","SCOUT","TROUT","UNIFY","VOWEL","WASTE","EXTRA","YOUNG","ZEBRA","ALONE","BENCH","CHUNK","DRAFT","EVOKE","FAITH","GROAN","HOVER","IMPLY","JUMPY","KAYAK","LIVER","MERCY","NIGHT","OXBOW","PROXY","QUALM","RIVET","SWEAR","THORN","UNTIE","VINYL","WHOLE","EXPEL","YEARN","ZILCH","ABIDE","BURNT","CLOWN","DROVE","EIGHT","FLOWN","GRIPE","HIKED","INFER","JOKER","KINKY","LYRIC","MOOSE","NEWTS","OPTIC","PIVOT","QUIRK","RUGBY","STALE","TIARA"];
    let secret,grid,current,guesses,done;
    function initGame(){
      secret=WORDS[Math.floor(Math.random()*WORDS.length)];
      grid=Array.from({length:6},()=>Array(5).fill(null).map(()=>({letter:'',state:''})));
      current=0;guesses=0;done=false;
      document.getElementById('msg').textContent='Guess the word!';
      document.getElementById('play-again').style.display='none';
      renderBoard();renderKeyboard();
    }
    function renderBoard(){
      const b=document.getElementById('board');b.innerHTML='';
      for(let r=0;r<6;r++){
        const row=document.createElement('div');row.className='row';row.id='row-'+r;
        for(let c=0;c<5;c++){
          const t=document.createElement('div');t.className='tile';t.id=`t-${r}-${c}`;
          const cell=grid[r][c];
          if(cell.letter)t.textContent=cell.letter;
          if(cell.state)t.classList.add(cell.state);
          else if(cell.letter)t.classList.add('filled');
          row.appendChild(t);
        }
        b.appendChild(row);
      }
    }
    function renderKeyboard(){
      const rows=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];
      const kb=document.getElementById('keyboard');kb.innerHTML='';
      rows.forEach(row=>{
        const div=document.createElement('div');div.className='kb-row';
        row.forEach(k=>{
          const btn=document.createElement('button');btn.className='key';
          if(k==='ENTER'||k==='⌫')btn.classList.add('wide');
          btn.textContent=k;btn.dataset.key=k;btn.onclick=()=>handleKey(k);
          div.appendChild(btn);
        });
        kb.appendChild(div);
      });
    }
    function updateKeyColor(letter,state){
      const p={correct:3,present:2,absent:1};
      const btn=document.querySelector(`[data-key="${letter}"]`);if(!btn)return;
      const cur=btn.className.includes('correct')?'correct':btn.className.includes('present')?'present':btn.className.includes('absent')?'absent':null;
      if(!cur||(p[state]||0)>(p[cur]||0)){btn.classList.remove('correct','present','absent');btn.classList.add(state);}
    }
    function handleKey(k){
      if(done)return;
      if(k==='⌫'){if(current>0){current--;grid[guesses][current]={letter:'',state:''};updateTile(guesses,current);} return;}
      if(k==='ENTER'){if(current<5){shake();return;}submitGuess(grid[guesses].map(c=>c.letter).join(''));return;}
      if(current<5&&/^[A-Z]$/.test(k)){grid[guesses][current]={letter:k,state:''};updateTile(guesses,current,true);current++;}
    }
    function updateTile(r,c,pop=false){
      const t=document.getElementById(`t-${r}-${c}`);if(!t)return;
      const cell=grid[r][c];t.textContent=cell.letter||'';t.className='tile';
      if(cell.state)t.classList.add(cell.state);else if(cell.letter)t.classList.add('filled');
      if(pop){t.classList.add('pop');setTimeout(()=>t.classList.remove('pop'),150);}
    }
    function shake(){const row=document.getElementById('row-'+guesses);if(!row)return;row.querySelectorAll('.tile').forEach(t=>{t.classList.add('shake');setTimeout(()=>t.classList.remove('shake'),400);});}
    function submitGuess(guess){
      const result=Array(5).fill('absent');const sArr=secret.split('');const used=Array(5).fill(false);
      for(let i=0;i<5;i++)if(guess[i]===sArr[i]){result[i]='correct';used[i]=true;}
      for(let i=0;i<5;i++){if(result[i]==='correct')continue;for(let j=0;j<5;j++){if(!used[j]&&guess[i]===sArr[j]){result[i]='present';used[j]=true;break;}}}
      let delay=0;
      for(let i=0;i<5;i++){const idx=i;setTimeout(()=>{grid[guesses][idx]={letter:guess[idx],state:result[idx]};updateTile(guesses,idx);updateKeyColor(guess[idx],result[idx]);},delay);delay+=200;}
      const won=result.every(r=>r==='correct');const row=guesses;guesses++;current=0;
      setTimeout(()=>{
        if(won){done=true;const msgs=['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'];document.getElementById('msg').textContent=msgs[row]||'Correct!';document.getElementById('play-again').style.display='block';}
        else if(guesses===6){done=true;document.getElementById('msg').textContent=`The word was ${secret}`;document.getElementById('play-again').style.display='block';}
      },delay);
    }
    document.addEventListener('keydown',e=>{
      if(e.ctrlKey||e.metaKey||e.altKey)return;
      if(e.key==='Backspace')handleKey('⌫');
      else if(e.key==='Enter')handleKey('ENTER');
      else if(/^[a-zA-Z]$/.test(e.key))handleKey(e.key.toUpperCase());
    });
    initGame();
  </script>
</body>
</html>
